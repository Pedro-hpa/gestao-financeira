{% extends 'base.html' %}
{% block title %}Cadastro - Gestão Financeira{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 440px; border-top: 4px solid #0d6efd;">
        <h3 class="text-center mb-4">Criar Conta</h3>
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary fw-bold">Cadastrar</button>
            </div>
            <p class="text-center mt-3 mb-0 small">Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
        </form>
    </div>
</div>
{% endblock %}
